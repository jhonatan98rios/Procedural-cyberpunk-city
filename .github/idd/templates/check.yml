# Compiled mechanical check — shape template.
#
# One learned rule -> one file at .github/idd/checks/<check-id>.yml,
# where check-id = idd-<rule-slug> and matches the rule's Check-Id
# column in .github/idd/learned.md. Written at rule-approval time,
# reviewed and committed like any code. Session hooks run these via
# `ast-grep scan` — on every edit, and as the blocking in-session
# commit gate.
#
# This template lives under .github/idd/templates/, outside the
# scanned checks directory, so it is never counted or executed as a
# live check — copy it to .github/idd/checks/<check-id>.yml to
# compile a rule.
#
# Scope compiles into `files:`. When the rule's Scope is narrower
# than repo-wide (`*`), copy its globs into `files:` so the check
# never fires outside the rule's scope. Omit `files:` entirely for
# repo-wide rules.
#
# Every check lands with a fixture pair at
# .github/idd/check-tests/<check-id>-test.yml (see the template
# there) proving the pattern actually fires — dead checks look like
# compliance.
#
# The message must cite the Constraint and Rationale so a failing
# check teaches, not just blocks.
id: idd-example-rule-slug
language: python
severity: error
files:
  - "src/api/**"
rule:
  pattern: getattr($OBJ, $ATTR, $DEFAULT)
message: >-
  Do not use getattr with a default; access the attribute directly.
  Rationale: silent fallbacks hide schema drift (learned rule
  example-rule-slug in .github/idd/learned.md).
